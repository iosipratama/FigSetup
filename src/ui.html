<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    background: #fff;
    overflow: hidden;
    height: 520px;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 14px 16px;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
  }

  .header .version {
    font-size: 11px;
    color: #aaa;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 2px 0 6px;
  }

  .preset-card {
    border: 1.5px solid #e5e5e5;
    border-radius: 8px;
    padding: 11px 12px;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
    background: #fff;
    user-select: none;
  }

  .preset-card:hover {
    border-color: #b0b0b0;
    background: #fafafa;
  }

  .preset-card.selected {
    border-color: #0d99ff;
    background: #f0f8ff;
  }

  .preset-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .radio {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid #c0c0c0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.1s;
  }

  .preset-card.selected .radio {
    border-color: #0d99ff;
  }

  .radio-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #0d99ff;
    display: none;
  }

  .preset-card.selected .radio-dot {
    display: block;
  }

  .preset-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .preset-desc {
    font-size: 11px;
    color: #777;
    line-height: 1.55;
    margin-bottom: 8px;
  }

  .pages-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .page-tag {
    font-size: 10px;
    color: #555;
    background: #f0f0f0;
    border-radius: 4px;
    padding: 2px 6px;
    transition: background 0.1s, color 0.1s;
  }

  .preset-card.selected .page-tag {
    background: #dbeeff;
    color: #0077cc;
  }

  .footer {
    padding: 10px 12px 12px;
    border-top: 1px solid #e5e5e5;
    flex-shrink: 0;
  }

  .status {
    font-size: 11px;
    color: #888;
    min-height: 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
  }

  .status.info    { color: #0d99ff; }
  .status.success { color: #14AE5C; }
  .status.error   { color: #F24822; }

  .footer-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    height: 32px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s;
  }

  .btn-primary {
    flex: 1;
    background: #0d99ff;
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { background: #0b8ae6; }
  .btn-primary:active:not(:disabled) { background: #0a7acc; }

  .btn-danger {
    padding: 0 14px;
    background: #fff2f0;
    color: #F24822;
    border: 1.5px solid #ffd5cc;
  }

  .btn-danger:hover:not(:disabled) { background: #ffe5e0; }
  .btn-danger:active:not(:disabled) { background: #ffd5cc; }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .loading {
    padding: 24px 0;
    text-align: center;
    color: #bbb;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>FigSetup</h1>
  <span class="version">v0.1</span>
</div>

<div class="content" id="content">
  <div class="loading">Loading presets…</div>
</div>

<div class="footer">
  <div class="status" id="status"></div>
  <div class="footer-actions">
    <button class="btn btn-danger" id="reset-btn">Reset</button>
    <button class="btn btn-primary" id="apply-btn" disabled>Apply Preset</button>
  </div>
</div>

<script>
  let selectedId = null;
  const applyBtn = document.getElementById('apply-btn');
  const resetBtn = document.getElementById('reset-btn');
  const statusEl = document.getElementById('status');
  const contentEl = document.getElementById('content');

  function renderPresets(presets) {
    contentEl.innerHTML = '<div class="section-label">Choose a preset</div>';

    presets.forEach(preset => {
      const card = document.createElement('div');
      card.className = 'preset-card';
      card.dataset.id = preset.id;
      card.innerHTML = `
        <div class="preset-header">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="preset-name">${preset.label}</div>
        </div>
        <div class="preset-desc">${preset.description}</div>
        <div class="pages-list">
          ${preset.pages.map(p => `<span class="page-tag">${p}</span>`).join('')}
        </div>
      `;
      card.addEventListener('click', () => selectPreset(card, preset.id));
      contentEl.appendChild(card);
    });

    const first = contentEl.querySelector('.preset-card');
    if (first) first.click();
  }

  function selectPreset(card, id) {
    document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedId = id;
    applyBtn.disabled = false;
    setStatus('', '');
  }

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  applyBtn.addEventListener('click', () => {
    if (!selectedId) return;
    applyBtn.disabled = true;
    resetBtn.disabled = true;
    setStatus('Applying…', 'info');
    parent.postMessage({ pluginMessage: { type: 'apply-preset', presetId: selectedId } }, '*');
  });

  resetBtn.addEventListener('click', () => {
    applyBtn.disabled = true;
    resetBtn.disabled = true;
    setStatus('Clearing…', 'info');
    parent.postMessage({ pluginMessage: { type: 'reset' } }, '*');
  });

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'presets') {
      renderPresets(msg.data);
    } else if (msg.type === 'progress') {
      setStatus(msg.message, 'info');
    } else if (msg.type === 'done') {
      setStatus(msg.message, 'success');
      applyBtn.disabled = !selectedId;
      resetBtn.disabled = false;
    } else if (msg.type === 'error') {
      setStatus('Error: ' + msg.message, 'error');
      applyBtn.disabled = !selectedId;
      resetBtn.disabled = false;
    }
  };

  parent.postMessage({ pluginMessage: { type: 'get-presets' } }, '*');
</script>

</body>
</html>
